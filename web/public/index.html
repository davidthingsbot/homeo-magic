<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeo-Magic | Homeopathic Repertorization</title>
  <meta name="description" content="Find matching homeopathic remedies by selecting symptoms. 74,000+ symptoms, 2,400+ remedies.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Header */
    header {
      text-align: center;
      margin-bottom: 24px;
      color: white;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    #status {
      margin-top: 8px;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    
    /* Search */
    .search-box {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .search-box label {
      display: block;
      font-weight: 600;
      color: #4c1d95;
      margin-bottom: 8px;
    }
    .search-wrapper { position: relative; }
    #search {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 2px solid #e9d5ff;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    #search:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    #search:disabled { background: #f5f3ff; cursor: not-allowed; }
    
    /* Dropdown */
    #dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 2px solid #8b5cf6;
      border-radius: 10px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: none;
    }
    #dropdown.show { display: block; }
    .dropdown-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f3e8ff;
      font-size: 14px;
      transition: background 0.15s;
    }
    .dropdown-item:hover { background: #f5f3ff; }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; }
    
    /* Selected symptoms */
    #selected {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .symptom-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      color: #5b21b6;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      animation: fadeIn 0.2s ease-out;
    }
    .symptom-tag button {
      background: #dc2626;
      color: white;
      border: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .symptom-tag button:hover { background: #b91c1c; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } }
    
    /* Results table */
    .results-box {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .results-header {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: white;
      padding: 16px 20px;
      font-weight: 600;
    }
    .table-wrapper {
      overflow-x: auto;
      max-height: 70vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid #f3e8ff;
    }
    th {
      background: #faf5ff;
      font-weight: 600;
      color: #5b21b6;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    th.symptom-header {
      text-align: left;
      min-width: 250px;
      background: #f3e8ff;
    }
    .remedy-header {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      height: 100px;
      vertical-align: bottom;
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s;
    }
    .remedy-header:hover {
      background: #ede9fe;
    }
    
    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #f5f3ff;
      border-bottom: 1px solid #e9d5ff;
      flex-wrap: wrap;
    }
    .filter-bar label {
      font-weight: 500;
      color: #5b21b6;
      font-size: 13px;
    }
    .filter-bar input[type="range"] {
      width: 150px;
      accent-color: #7c3aed;
    }
    .filter-bar .score-display {
      font-weight: 700;
      color: #7c3aed;
      min-width: 35px;
    }
    .filter-bar button {
      padding: 6px 12px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .filter-bar button:hover {
      background: #6d28d9;
    }
    .filter-bar button.secondary {
      background: #e9d5ff;
      color: #5b21b6;
    }
    .filter-bar button.secondary:hover {
      background: #ddd6fe;
    }
    .filter-info {
      font-size: 12px;
      color: #6b7280;
      margin-left: auto;
    }
    .score-row td {
      background: linear-gradient(180deg, #faf5ff 0%, #ede9fe 100%);
      font-weight: 700;
      color: #5b21b6;
      font-size: 14px;
      border-bottom: 2px solid #c4b5fd;
    }
    .score-row td:first-child {
      text-align: left;
      font-weight: 600;
    }
    .score-row td:not(:first-child) {
      cursor: pointer;
      transition: all 0.15s;
    }
    .score-row td:not(:first-child):hover {
      background: #ddd6fe;
      transform: scale(1.1);
    }
    .symptom-row td:first-child {
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .symptom-row td:first-child:hover {
      background: #fef2f2;
      color: #dc2626;
    }
    .symptom-row td:first-child::before {
      content: '×';
      color: #dc2626;
      margin-right: 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .symptom-row td:first-child:hover::before {
      opacity: 1;
    }
    
    /* Grade cells */
    .grade { 
      width: 28px; 
      height: 28px; 
      border-radius: 4px; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
    }
    .grade-1 { background: #fef3c7; color: #92400e; }
    .grade-2 { background: #fed7aa; color: #9a3412; }
    .grade-3 { background: #fca5a5; color: #991b1b; }
    .grade-4 { background: #f87171; color: #7f1d1d; }
    
    /* Empty state */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #6b7280;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    
    /* Loading */
    .loading { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔮 Homeo-Magic</h1>
      <p id="status" class="loading">Loading repertory data...</p>
    </header>

    <div class="search-box">
      <label for="search">Add symptoms:</label>
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Type to search (e.g., headache, anxiety, burning)..." autocomplete="off" disabled>
        <div id="dropdown"></div>
      </div>
    </div>

    <div id="selected"></div>

    <div id="results" class="results-box"></div>
  </div>

  <script>
    let symptoms = null;
    let remedies = null;
    let selectedSymptoms = [];
    let minScore = 0; // Minimum score threshold

    // Load data
    async function loadData() {
      const status = document.getElementById('status');
      const search = document.getElementById('search');
      
      try {
        const remediesRes = await fetch('/data/remedies.json');
        if (!remediesRes.ok) throw new Error('Failed to load remedies');
        remedies = await remediesRes.json();
        
        status.textContent = 'Loading symptoms...';
        const symptomsRes = await fetch('/data/symptoms.json');
        if (!symptomsRes.ok) throw new Error('Failed to load symptoms');
        symptoms = await symptomsRes.json();
        
        status.textContent = `${Object.keys(symptoms).length.toLocaleString()} symptoms • ${Object.keys(remedies).length.toLocaleString()} remedies`;
        status.classList.remove('loading');
        search.disabled = false;
        search.focus();
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.style.color = '#fca5a5';
        console.error(e);
      }
    }

    // Search
    function searchSymptoms(query) {
      if (!symptoms || query.length < 2) return [];
      const q = query.toLowerCase();
      const matches = [];
      for (const sym of Object.keys(symptoms)) {
        if (sym.toLowerCase().includes(q) && !selectedSymptoms.includes(sym)) {
          matches.push(sym);
          if (matches.length >= 50) break;
        }
      }
      return matches;
    }

    function highlightMatch(text, query) {
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
    }

    function showDropdown(matches) {
      const dd = document.getElementById('dropdown');
      if (!matches.length) {
        dd.classList.remove('show');
        return;
      }
      const query = document.getElementById('search').value;
      dd.innerHTML = matches.map(m => 
        `<div class="dropdown-item" onclick="addSymptom('${m.replace(/'/g, "\\'")}')">${highlightMatch(m, query)}</div>`
      ).join('');
      dd.classList.add('show');
    }

    // Symptom management
    function addSymptom(sym) {
      if (!selectedSymptoms.includes(sym)) {
        selectedSymptoms.push(sym);
        renderSelected();
        renderResults();
      }
      document.getElementById('search').value = '';
      document.getElementById('dropdown').classList.remove('show');
      document.getElementById('search').focus();
    }

    function removeSymptom(sym) {
      selectedSymptoms = selectedSymptoms.filter(s => s !== sym);
      renderSelected();
      renderResults();
    }

    function renderSelected() {
      const el = document.getElementById('selected');
      el.innerHTML = selectedSymptoms.map(s => `
        <span class="symptom-tag">
          ${s}
          <button onclick="removeSymptom('${s.replace(/'/g, "\\'")}')">×</button>
        </span>
      `).join('');
    }

    // Calculate and render results
    function renderResults() {
      const container = document.getElementById('results');
      
      if (!selectedSymptoms.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>Search and select symptoms above to find matching remedies</p>
          </div>`;
        return;
      }

      // Calculate scores
      const scores = {};
      const gradeMap = {}; // remedy -> symptom -> grade
      
      for (const sym of selectedSymptoms) {
        const data = symptoms[sym];
        if (!data) continue;
        for (const [rem, grade] of Object.entries(data.remedies)) {
          if (!scores[rem]) {
            scores[rem] = 0;
            gradeMap[rem] = {};
          }
          scores[rem] += grade;
          gradeMap[rem][sym] = grade;
        }
      }

      // Sort by score
      const allSorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1]);

      if (!allSorted.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">😔</div>
            <p>No remedies found for these symptoms</p>
          </div>`;
        return;
      }

      // Normalize to 100 (top remedy = 100)
      const maxScore = allSorted[0][1];
      const allNormalized = allSorted.map(([rem, score]) => [rem, Math.round((score / maxScore) * 100), score]);
      
      // Filter by minScore and limit to 40
      const filtered = allNormalized.filter(([_, normScore]) => normScore >= minScore);
      const sorted = filtered.slice(0, 40);
      const normalizedScores = sorted.map(([rem, normScore]) => [rem, normScore]);

      // Build table
      const totalRemedies = allNormalized.length;
      const shownRemedies = sorted.length;
      const hiddenRemedies = filtered.length - shownRemedies;
      
      let html = `
        <div class="results-header">${totalRemedies} Remedies Found</div>
        <div class="filter-bar">
          <label>Min score:</label>
          <input type="range" id="scoreSlider" min="0" max="100" value="${minScore}" oninput="updateMinScore(this.value)">
          <span class="score-display" id="scoreDisplay">${minScore}</span>
          ${minScore > 0 ? `<button class="secondary" onclick="resetFilter()">Reset</button>` : ''}
          <span class="filter-info">
            Showing ${shownRemedies} of ${filtered.length} remedies (≥${minScore})
            ${hiddenRemedies > 0 ? ` • ${hiddenRemedies} more below` : ''}
          </span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th class="symptom-header">Analysis</th>
                ${sorted.map(([rem]) => `<th class="remedy-header" onclick="filterToRemedy('${rem.replace(/'/g, "\\'")}')" title="Click to filter: show only this remedy and higher">${rem}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              <tr class="score-row">
                <td>Score</td>
                ${normalizedScores.map(([rem, score]) => `<td onclick="setMinScore(${score})" title="Click to set minimum score to ${score}">${score}</td>`).join('')}
              </tr>
              ${selectedSymptoms.map(sym => {
                const symData = symptoms[sym];
                const symCount = symData ? Object.keys(symData.remedies).length : 0;
                return `
                  <tr class="symptom-row">
                    <td onclick="removeSymptom('${sym.replace(/'/g, "\\'")}')">${sym} (${symCount})</td>
                    ${sorted.map(([rem]) => {
                      const grade = gradeMap[rem]?.[sym];
                      if (!grade) return '<td></td>';
                      return `<td><span class="grade grade-${grade}">${grade}</span></td>`;
                    }).join('')}
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;

      container.innerHTML = html;
    }

    // Filter functions
    function setMinScore(score) {
      minScore = score;
      renderResults();
    }
    
    function updateMinScore(value) {
      minScore = parseInt(value);
      document.getElementById('scoreDisplay').textContent = minScore;
      renderResults();
    }
    
    function resetFilter() {
      minScore = 0;
      renderResults();
    }
    
    function filterToRemedy(remedyName) {
      // Find the score of this remedy and set minScore to it
      const container = document.getElementById('results');
      const headers = container.querySelectorAll('.remedy-header');
      const scores = container.querySelectorAll('.score-row td:not(:first-child)');
      
      for (let i = 0; i < headers.length; i++) {
        if (headers[i].textContent === remedyName) {
          const score = parseInt(scores[i].textContent);
          setMinScore(score);
          break;
        }
      }
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', e => {
      showDropdown(searchSymptoms(e.target.value));
    });

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('dropdown').classList.remove('show');
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) {
        document.getElementById('dropdown').classList.remove('show');
      }
    });

    // Initialize
    loadData();
    renderResults();
  </script>
</body>
</html>
